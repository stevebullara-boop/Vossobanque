<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>VossoBanque</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0e0e16;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.card{
  background:#1c1c2b;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
button{
  padding:8px 15px;
  border:none;
  border-radius:6px;
  background:#7c5cff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🏦 VossoBanque</h1>

<h2>Classement</h2>
<div id="players"></div>

<h2>Boutique</h2>
<div id="shop"></div>

<script>

/* CONFIG */
const PROXY = 'https://vossobanque-proxy.small-snowflake-c6c9.workers.dev';
const BASE  = 'app2mJ7oSODZd9OoU';

const T_PLR  = 'tbl0Kl91e57KCdkiy';
const T_SHOP = 'tblELehPqsb0ATygV';
const T_TRX  = 'tblfooPjqvLZ3YSsD';

/* CHAMPS */
const P_NM='fldj63VB2omDb3k5L';
const P_BK='fldH20mY6pJEJaXUA';
const P_CD='fld0VgreDsvD7931Q';

const S_NM="Nom de l'article";
const S_DS='Description';
const S_PR='Prix';
const S_ST='Stock disponible';
const S_CT='Catégorie';
const S_IM="Image de l'objet";
const S_GN='Gain UC';

const TR_BY="Prénom de L'acheteur";
const TR_AR='Article';
const TR_AM='Montant';
const TR_ST='Erreur';
const TR_GN='Gain UC';

/* STATE */
let players=[],shop=[];

/* API */
async function atGet(tbl, fields=[]){
  const p=new URLSearchParams();
  fields.forEach(f=>p.append('fields[]',f));
  p.set('pageSize','100');

  const r=await fetch(`${PROXY}/v0/${BASE}/${tbl}?${p}`);
  return (await r.json()).records;
}

async function atPatch(tbl,id,fields){
  await fetch(`${PROXY}/v0/${BASE}/${tbl}/${id}`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
}

async function atPost(tbl,fields){
  await fetch(`${PROXY}/v0/${BASE}/${tbl}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
}

/* LOAD PLAYERS */
async function loadPlayers(){

  const recs=await atGet(T_PLR,[P_NM,P_BK,P_CD]);

  players=recs.map(r=>({
    id:r.id,
    name:r.fields[P_NM],
    bank:r.fields[P_BK]||0,
    code:r.fields[P_CD]
  })).sort((a,b)=>b.bank-a.bank);

  document.getElementById('players').innerHTML=
    players.map(p=>`
      <div class="card">
        <b>${p.name}</b><br>
        💰 ${p.bank} UC
      </div>
    `).join('');
}

/* LOAD SHOP */
async function loadShop(){

  const recs=await atGet(T_SHOP,[S_NM,S_DS,S_PR,S_ST,S_CT,S_IM,S_GN]);

  shop=recs.map(r=>({

    id:r.id,
    name:r.fields[S_NM],
    desc:r.fields[S_DS],
    price:r.fields[S_PR],
    stock:r.fields[S_ST],
    gain:r.fields[S_GN]||0,

    cat: typeof r.fields[S_CT]==='string'
      ? r.fields[S_CT]
      : (r.fields[S_CT]?.name || ''),

    img:r.fields[S_IM]?.[0]?.url || ''

  }));

  document.getElementById('shop').innerHTML=
    shop.map((s,i)=>`
      <div class="card">
        <b>${s.name}</b><br>
        💰 ${s.price} UC<br>
        🎯 Gain: ${s.gain}<br><br>
        <button onclick="buy(${i})">Acheter</button>
      </div>
    `).join('');
}

/* BUY */
async function buy(i){

  const item=shop[i];

  const player=players[0]; // simplifié

  if(player.bank<item.price){
    alert("Pas assez de coins");
    return;
  }

  const newBank=player.bank-item.price;

  await atPatch(T_PLR,player.id,{[P_BK]:newBank});

  await atPatch(T_SHOP,item.id,{[S_ST]:item.stock-1});

  await atPost(T_TRX,{
    [TR_BY]:player.code,
    [TR_AR]:item.name,
    [TR_AM]:item.price,
    [TR_ST]: item.cat==="Up"
      ? "En attente mission"
      : "Validé",
    [TR_GN]:item.gain
  });

  alert("Achat OK");

  loadPlayers();
}

/* INIT */
loadPlayers();
loadShop();

</script>

</body>
</html>
